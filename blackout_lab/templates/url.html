<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Open Redirect / SSRF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-info text-dark py-3">
                    <h3 class="mb-0">외부 리소스 요청 (SSRF / Open Redirect 실습)</h3>
                </div>
                <div class="card-body p-4">
                    <form method="GET">
                        <div class="mb-4">
                            <label class="form-label fw-bold">타겟 패치(Fetch) 주소 입력</label>
                            <input type="text" class="form-control form-control-lg" name="target" placeholder="http://..." value="http://example.com" autocomplete="off">
                            <div class="form-text">입력한 URL의 컨텐츠를 서버 딴에서 읽어옵니다.</div>
                        </div>
                        <button type="submit" class="btn btn-info w-100 btn-lg mb-3">응답 데이터 확인하기</button>
                    </form>
                    

                    
                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none text-secondary">← 메인으로 돌아가기</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
