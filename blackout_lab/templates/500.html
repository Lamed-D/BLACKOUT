{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8">
        <div class="card bg-dark border-danger mb-3">
            <div class="card-header border-danger text-danger fw-bold">
                <i class="bi bi-exclamation-triangle"></i> 500 Internal Server Error
            </div>
            <div class="card-body">
                <p>The server encountered an unexpected condition.</p>
                {% if error %}
                    <div class="alert alert-danger mb-4">
                        <i class="bi bi-x-octagon-fill me-2 fs-5"></i>
                        <strong>오류 메시지:</strong> <br>{{ error }}
                    </div>
                {% endif %}

                {% if error_tb %}
                    <div class="alert alert-secondary text-start mb-4" style="max-height: 300px; overflow-y: auto;">
                        <i class="bi bi-bug-fill me-2"></i><strong>상세 오류 내역 (Stack Trace)</strong>
                        <hr>
                        <pre class="small text-muted mb-0"><code>{{ error_tb }}</code></pre>
                    </div>
                {% endif %}
                
                <a href="{{ url_for('board.index') }}" class="btn btn-outline-primary btn-lg px-4 rounded-pill fw-bold shadow-sm">Return Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
