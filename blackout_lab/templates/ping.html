{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">


        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-dark text-white p-3"><h4><i class="bi bi-terminal"></i> 카페 서버 네트워크 진단(Ping)</h4></div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">테스트 대상 IP</label>
                        <input type="text" class="form-control form-control-lg" name="ip"
                               placeholder="8.8.8.8 등 아이피 입력"
                               {% if not allow %}disabled{% endif %}>
                        <div class="form-text mt-2">시스템 <code>ping</code> 명령어를 내부적으로 실행하여 접속 상태를 진단합니다.</div>
                    </div>
                    <button type="submit" class="btn btn-dark btn-lg" {% if not allow %}disabled{% endif %}>진단 시작</button>
                </form>
                {% if output %}
                <hr>
                <div class="bg-dark text-success p-3 rounded font-monospace" style="white-space: pre-wrap;">{{ output }}</div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
