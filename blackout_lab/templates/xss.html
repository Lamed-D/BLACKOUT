<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Search - XSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-header bg-success text-white py-3">
            <h3 class="mb-0">게시판 검색 (Reflected XSS 실습)</h3>
        </div>
        <div class="card-body p-4">
            <form method="GET">
                <div class="input-group mb-4">
                    <input type="text" class="form-control form-control-lg" name="keyword" placeholder="검색어를 입력하세요..." autocomplete="off">
                    <button class="btn btn-success btn-lg" type="submit">검색 (Search)</button>
                </div>
            </form>
            
            {% if keyword %}
                <div class="alert alert-info py-4 border-start border-info border-4">
                    <!-- [VULNERABILITY START] -->
                    <!-- |safe 필터 적용으로 HTML 특수문자가 이스케이프 되지 않아 브라우저에서 스크립트가 실행됨 -->
                    <h4 class="mb-0">"{{ keyword | safe }}" 에 대한 검색 결과입니다.</h4>
                    <!-- [VULNERABILITY END] -->
                </div>
                <!-- 검색 결과가 없음을 가정한 더미 UI -->
                <div class="alert alert-secondary mt-3">
                    일치하는 게시물이 존재하지 않습니다.
                </div>
            {% endif %}
            

            
            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none text-secondary">← 메인으로 돌아가기</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
